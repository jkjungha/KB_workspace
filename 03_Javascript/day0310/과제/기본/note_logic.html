<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script>
      let date = new Date();
      let month = date.getMonth();
      if (3 <= month < 6) {
        alert('봄입니다.');
      } else if (6 <= month < 9) {
        alert('여름입니다.');
      } else if (9 <= month < 12) {
        alert('가을입니다.');
      } else {
        alert('겨울입니다.');
      }
    </script>
  </head>
  <body></body>
</html>
