<script>
  let age = Number(prompt('나이를 입력하세요'));
  //사용자로부터 나이를 입력 받음

  if (age >= 18) {
    console.log('10,000을 내야합니다.');
  } else {
    console.log('5,000을 내야합니다.');
  }

  let value = 10;
  if (value === 10) {
    console.log('10이 맞습니다.');
  } else {
    console.log('10이 아닙니다.');
  }

  age = 30;
  if (age >= 65) {
    console.log('무료');
  } else if (65 >= age && age >= 18) {
    console.log('10,000을 내야합니다.');
  } else if (18 > age) {
    console.log('5,000을 내야합니다.');
  }

  let num = Number(prompt('숫자를 입력하세요'));
  switch (num) {
    case 10:
      console.log('10입니다.');
    case 20:
      console.log('20입니다.');
    default:
      console.log('다른 숫자입니다.');
  }
</script>
