<!doctype html>
<html>
  <head>
    <title>CSS3 Position Property</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
        z-index: 1;
      }
      .box:nth-child(2) {
        background-color: green;
        left: 60px;
        top: 60px;
        z-index: 10;
      }
      .box:nth-child(3) {
        background-color: blue;
        left: 110px;
        top: 110px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </body>
</html>
