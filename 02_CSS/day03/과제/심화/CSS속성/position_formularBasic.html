<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
        z-index: 1000;
      }
      .box:nth-child(2) {
        background-color: green;
        left: 60px;
        top: 60px;
        z-index: 100;
      }
      .box:nth-child(3) {
        background-color: blue;
        left: 110px;
        top: 110px;
        z-index: 10;
      }
      h1 {
        font-size: 30px;
        font-weight: bold;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
  </body>
</html>
