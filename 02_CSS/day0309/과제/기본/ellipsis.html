<!doctype html>
<html lang="en">
  <head>
    <style>
      h1,
      p {
        width: 300px;
      }
      .ellipsis {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <h1 class="ellipsis">
      Pariatur consequat deserunt quis officia et amet reprehenderit dolor
      nostrud.
    </h1>
    <p class="ellipsis">
      In laboris tempor dolore ut sit nostrud id nisi. Ad est amet est consequat
      ea dolor.
    </p>
  </body>
</html>
